<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/><title>團體查詢</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,"PingFang TC",sans-serif;background:#F5F1EA;color:#4A4036}
.wrap{max-width:760px;margin:0 auto;padding:18px}
.top{display:flex;align-items:center;gap:10px;padding:14px 0;border-bottom:1px solid #E6DFD4;margin-bottom:16px}
.logo{width:34px;height:34px;border-radius:8px;background:#B89A6E;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
h1{font-size:17px;font-weight:600}
.sb{display:flex;gap:8px;margin-bottom:14px}
input,button{font-size:15px;padding:11px 13px;border-radius:9px;border:1px solid #D9CFC0;font-family:inherit}
input{flex:1;background:#fff}button{background:#B89A6E;color:#fff;border:none;cursor:pointer;font-weight:600;white-space:nowrap}
button:disabled{opacity:.5}
.hint{font-size:12px;color:#9C9081;margin-bottom:14px}
.chip{display:inline-block;background:#EDE6DA;color:#6B5D49;font-size:12px;padding:3px 9px;border-radius:12px;margin:2px 4px 2px 0;cursor:pointer}
.card{background:#fff;border:1px solid #EAE2D5;border-radius:11px;padding:14px;margin-bottom:11px}
.ct{font-size:16px;font-weight:600;color:#3D342A}
.cd{font-size:13px;color:#8A7E6D;margin:5px 0}
.cp{font-size:15px;font-weight:700;color:#B07A2E}
.cdep{font-size:13px;color:#5B6B4E;margin-top:5px}
.cdep b{color:#46603a}
.src{font-size:11px;color:#A89C8E;text-decoration:none}
.cnt{font-size:13px;color:#8A7E6D;margin-bottom:10px}
.spin{text-align:center;padding:40px;color:#9C9081}
.hide{display:none}.err{color:#9b5b4b;font-size:13px;margin-top:8px}
.login{max-width:340px;margin:60px auto;background:#fff;padding:24px;border-radius:14px}
.login label{font-size:13px;color:#6B5D49;display:block;margin:10px 0 4px}.login input{width:100%}
.login button{width:100%;margin-top:16px}
</style></head><body>
<div id="login" class="login">
  <div class="top" style="border:none;justify-content:center"><div class="logo">D</div><h1>團體查詢</h1></div>
  <label>帳號</label><input id="email" type="email" autocomplete="username"/>
  <label>密碼</label><input id="pw" type="password" autocomplete="current-password"/>
  <button id="lb" onclick="doLogin()">登入</button><div class="err hide" id="le"></div>
</div>
<div id="app" class="wrap hide">
  <div class="top"><div class="logo">D</div><h1>團體查詢 <span style="font-size:12px;color:#9C9081;font-weight:400">demo</span></h1></div>
  <div class="sb"><input id="q" placeholder="試試：8月想去中亞 / 9月日本 / 想去歐洲" onkeydown="if(event.key==='Enter')go()"/><button onclick="go()">查詢</button></div>
  <div class="hint">範例：<span class="chip" onclick="ex('8月想去中亞')">8月想去中亞</span><span class="chip" onclick="ex('9月日本')">9月日本</span><span class="chip" onclick="ex('想去歐洲')">想去歐洲</span><span class="chip" onclick="ex('10月東南亞')">10月東南亞</span></div>
  <div id="cnt" class="cnt"></div><div id="res"></div>
</div>
<script>
const SB=supabase.createClient('https://aawrgygqgemgqssflfrx.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhd3JneWdxZ2VtZ3Fzc2ZsZnJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMDM3NTYsImV4cCI6MjA5Mzg3OTc1Nn0.XqYwfN9_RkinYXFnLUG90sQVfvVEhF-9yFU40AOHJec')
let DATA=[]
const REGION={'歐洲':['荷蘭','法國','比利時','盧森堡','英國','德國','奧地利','瑞士','義大利','西班牙','葡萄牙','捷克','匈牙利','希臘','克羅埃西亞','北歐','東歐'],'東南亞':['泰國','越南','新加坡','馬來西亞','印尼','菲律賓','柬埔寨','緬甸'],'中東':['杜拜','阿聯酋','卡達','約旦','以色列','埃及','土耳其'],'南美':['秘魯','智利','阿根廷','巴西','玻利維亞'],'北歐':['挪威','瑞典','芬蘭','丹麥','冰島'],'中亞':['哈薩克','吉爾吉斯','烏茲別克','塔吉克','土庫曼']}
const STOP=['想去','想','我','幫我','有沒有','有','團','的','月','去','要','找','推薦','出發','大概','預算','元','一個','帶','小孩','旅遊','旅行','請','問','可以']
function esc(t){return(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
async function doLogin(){const b=document.getElementById('lb');b.disabled=true
 const {error}=await SB.auth.signInWithPassword({email:document.getElementById('email').value,password:document.getElementById('pw').value});b.disabled=false
 if(error){const e=document.getElementById('le');e.textContent='登入失敗：'+error.message;e.classList.remove('hide');return}
 boot()}
async function boot(){const {data:{session}}=await SB.auth.getSession();if(!session)return
 document.getElementById('login').classList.add('hide');document.getElementById('app').classList.remove('hide')
 document.getElementById('res').innerHTML='<div class=spin>載入產品目錄…</div>'
 let all=[],from=0;while(true){const {data}=await SB.from('scrape_products').select('title,destinations,country,price_from,price_text,departures,source_url,source_agency,duration_days').range(from,from+999);if(!data||!data.length)break;all=all.concat(data);if(data.length<1000)break;from+=1000}
 DATA=all;document.getElementById('res').innerHTML='';document.getElementById('cnt').textContent='目錄共 '+DATA.length+' 個團、輸入需求查詢'}
function ex(t){document.getElementById('q').value=t;go()}
function parse(qs){
 const month=(qs.match(/(\d{1,2})\s*月/)||[])[1]||null
 let terms=[];let s=qs.replace(/\d+\s*月/g,'')
 for(const w of STOP)s=s.split(w).join(' ')
 const cjk=s.match(/[一-鿿]{2,}/g)||[];terms=[...new Set(cjk)]
 // region 展開
 let expanded=[...terms];for(const t of terms)if(REGION[t])expanded=expanded.concat(REGION[t])
 return {month,terms,expanded:[...new Set(expanded)]}
}
function go(){
 const qs=document.getElementById('q').value.trim();if(!qs)return
 const {month,terms,expanded}=parse(qs)
 let rows=DATA.filter(p=>{
   const hay=(p.title||'')+' '+(p.destinations||[]).join(' ')+' '+(p.country||'')
   const matchDest=expanded.length===0||expanded.some(t=>hay.includes(t))
   let matchMonth=true
   if(month){const mm='/'+(month.length<2?'0'+month:month)+'/';const m1='/'+month+'/';matchMonth=(p.departures||[]).some(d=>d.includes(mm)||d.includes(m1))}
   return matchDest&&matchMonth
 })
 rows.sort((a,b)=>(a.price_from||9e9)-(b.price_from||9e9))
 const cnt=document.getElementById('cnt')
 cnt.textContent='找到 '+rows.length+' 個團'+(month?'（'+month+'月出發）':'')+(terms.length?'｜'+terms.join('、'):'')
 const res=document.getElementById('res')
 if(!rows.length){res.innerHTML='<div class=spin>沒找到符合的團、換個說法試試</div>';return}
 res.innerHTML=rows.slice(0,30).map(p=>{
   let deps=(p.departures||[])
   if(month){const mm='/'+(month.length<2?'0'+month:month)+'/',m1='/'+month+'/';deps=deps.filter(d=>d.includes(mm)||d.includes(m1))}
   const depTxt=deps.slice(0,8).join('、')||(p.departures||[]).slice(0,6).join('、')
   return '<div class=card><div class=ct>'+esc(p.title)+' <span style="font-size:12px;color:#9C9081">'+esc(p.source_agency||'')+'</span></div>'+
     '<div class=cd>'+esc((p.destinations||[]).join(' / '))+'</div>'+
     '<div class=cp>'+esc(p.price_text||(p.price_from?'NT$'+p.price_from.toLocaleString():'價格洽詢'))+'</div>'+
     (depTxt?'<div class=cdep><b>出發：</b>'+esc(depTxt)+'</div>':'')+
     (p.source_url?'<div style="margin-top:6px"><a class=src href="'+esc(p.source_url)+'" target=_blank>原始頁面 ↗（成交前即時確認）</a></div>':'')+
   '</div>'
 }).join('')
}
boot()
</script></body></html>
