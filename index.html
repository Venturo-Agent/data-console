<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>資料工作台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--cream:#F6F2EC;--card:#fff;--line:#E2D9CC;--gold:#B5935A;--goldh:#A07F46;--primary:#3F3833;--secondary:#6E6258;--muted:#A89C8E;--ok:#6E8B6E;--okbg:#E8EEE4;--warn:#A87C3D;--warnbg:#F5ECD8;--danger:#B07A6A;--dangerbg:#F3E6E0;--info:#5e7c8a;--infobg:#E4ECEF}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--cream);color:var(--primary)}
.hide{display:none!important}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:30px;width:100%;max-width:360px}
.logo{width:44px;height:44px;border-radius:11px;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;margin-bottom:14px}
.lbox h1{font-size:19px;margin-bottom:4px}.lbox .sub{font-size:12.5px;color:var(--secondary);margin-bottom:18px}
label{font-size:12px;color:var(--secondary);display:block;margin:10px 0 4px}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:var(--cream);font-family:inherit}
textarea{min-height:80px;line-height:1.6}
.btn{background:var(--gold);color:#fff;border:none;border-radius:9px;padding:11px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:16px}
.btn:hover{background:var(--goldh)}.btn:disabled{opacity:.5}
.err{color:var(--danger);font-size:13px;margin-top:10px}
#app{min-height:100vh}
.top{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
.brand{display:flex;align-items:center;gap:10px}.brand .l{width:32px;height:32px;border-radius:8px;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.brand h1{font-size:16px}.who{font-size:12.5px;color:var(--secondary)}
.lnk{color:var(--gold);font-size:12.5px;cursor:pointer;background:none;border:none}
.wrap{padding:14px 18px;max-width:1200px;margin:0 auto}
.modes{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.mode-btn{padding:10px 18px;font-size:14px;font-weight:600;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--secondary);cursor:pointer}
.mode-btn.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.mode-btn:hover{border-color:var(--gold)}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:7px 13px;font-size:13px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--secondary);cursor:pointer}
.tab.on{background:var(--gold);color:#fff;border-color:var(--gold)}.tab .n{font-size:11px;opacity:.75;margin-left:5px}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.toolbar input{max-width:220px}.toolbar select{max-width:140px}
.cnt{font-size:12.5px;color:var(--muted);margin-bottom:10px}
.item{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px;cursor:pointer}
.item:hover{border-color:var(--gold)}
.itop{display:flex;justify-content:space-between;gap:10px}
.nm{font-weight:700;font-size:15px}.en{font-size:11.5px;color:var(--muted)}
.reg{font-size:12px;color:var(--secondary);margin-top:2px}
.desc{font-size:13px;color:var(--secondary);margin-top:6px;line-height:1.5}
.badges{display:flex;gap:5px;flex-direction:column;align-items:flex-end;flex-shrink:0}
.b{font-size:11px;padding:2px 9px;border-radius:999px;white-space:nowrap}
.bp{background:var(--warnbg);color:var(--warn)}.ba{background:var(--okbg);color:var(--ok)}.br{background:var(--dangerbg);color:var(--danger)}
.cat{background:var(--cream);color:var(--secondary);border:1px solid var(--line)}
.bf{background:var(--infobg);color:var(--info);border:1px solid #cbd6db}
.tag{display:inline-block;font-size:11px;background:#EDE6DA;color:#6B5D49;padding:2px 9px;border-radius:12px;margin:2px 4px 2px 0}
.qf{display:inline-block;font-size:10.5px;padding:1px 7px;border-radius:10px;margin-right:4px}
.qf.no{background:var(--dangerbg);color:var(--danger)}.qf.warn{background:var(--warnbg);color:var(--warn)}.qf.ok{background:var(--okbg);color:var(--ok)}
.miss{font-size:11px;color:var(--danger);margin-top:4px}
.mask{position:fixed;inset:0;background:rgba(40,35,30,.45);display:flex;align-items:center;justify-content:center;padding:14px;z-index:50}
.modal{background:var(--card);border-radius:14px;padding:20px;width:100%;max-width:580px;max-height:92vh;overflow:auto}
.modal h2{font-size:17px;margin-bottom:6px}
.sec{font-size:12px;font-weight:700;color:var(--gold);margin:14px 0 4px;border-bottom:1px solid var(--line);padding-bottom:4px}
.row2{display:flex;gap:10px}.row2>div{flex:1}.row3{display:flex;gap:8px}.row3>div{flex:1}
.gmaps{font-size:12.5px;color:var(--gold);cursor:pointer;background:none;border:none;margin:6px 0;text-decoration:underline;padding:0}
.src-btn{display:inline-block;padding:8px 14px;background:var(--info);color:#fff;border-radius:8px;font-size:13px;text-decoration:none;font-weight:600;margin:4px 4px 0 0}
.src-btn:hover{opacity:.9}
.mactions{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;position:sticky;bottom:0;background:var(--card);padding-top:10px}
.btn2{padding:9px 14px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--secondary)}
.btn2.gold{background:var(--gold);color:#fff;border-color:var(--gold)}.btn2.ok{background:var(--ok);color:#fff;border-color:var(--ok)}.btn2.danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.spin{text-align:center;padding:40px;color:var(--muted)}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:18px}
.dash-card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px}
.dash-card h3{font-size:13px;color:var(--secondary);margin-bottom:8px}
.dash-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px dashed var(--line)}
.dash-row:last-child{border:none}
.dash-row .n{font-weight:700;color:var(--primary)}
.dash-row .pct{font-size:11.5px;color:var(--muted)}
.prod-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.prod-meta .b{background:var(--cream);border:1px solid var(--line);color:var(--secondary)}
.prod-price{font-size:15px;font-weight:700;color:var(--goldh);margin-top:4px}
.prod-deps{font-size:12px;color:var(--secondary);margin-top:3px}
.kvgrid{display:grid;grid-template-columns:80px 1fr;gap:6px 12px;font-size:13px;margin:8px 0}
.kvgrid .k{color:var(--secondary)}
</style></head><body>
<div id="login"><div class="lbox">
  <div class="logo">D</div><h1>資料工作台</h1><div class="sub">請以授權帳號登入</div>
  <label>Email</label><input id="email" type="email" autocomplete="username"/>
  <label>密碼</label><input id="pw" type="password" autocomplete="current-password"/>
  <button class="btn" id="loginBtn" onclick="doLogin()">登入</button>
  <div class="err hide" id="loginErr"></div>
</div></div>
<div id="app" class="hide">
 <div class="top"><div class="brand"><div class="l">D</div><h1>資料工作台</h1></div>
  <div><span class="who" id="who"></span> <button class="lnk" onclick="doLogout()">登出</button></div></div>
 <div class="wrap">
  <div class="modes">
   <div class="mode-btn on" id="m-cands" onclick="setMode('cands')">📍 景點 / 飯店 / 餐廳</div>
   <div class="mode-btn" id="m-prods" onclick="setMode('prods')">🎫 團體產品</div>
   <div class="mode-btn" id="m-compare" onclick="setMode('compare')">🔍 商品比對</div>
   <div class="mode-btn" id="m-dash" onclick="setMode('dash')">📊 Dashboard</div>
  </div>
  <div id="view"></div>
 </div>
</div>
<div id="modalRoot"></div>
<script>
const SB=supabase.createClient('https://aawrgygqgemgqssflfrx.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhd3JneWdxZ2VtZ3Fzc2ZsZnJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMDM3NTYsImV4cCI6MjA5Mzg3OTc1Nn0.XqYwfN9_RkinYXFnLUG90sQVfvVEhF-9yFU40AOHJec')
let CANDS=[],PRODS=[],MODE='cands',activeAgency=null,editing=null,editKind='c'
function esc(t){return(t||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function v(id){const e=document.getElementById(id);return e?e.value:''}
function show(id){document.getElementById(id).classList.remove('hide')}
function hide(id){document.getElementById(id).classList.add('hide')}
function miss(d){const m=[];if(!(d.description&&d.description.length>=20))m.push('描述');if(d.latitude==null)m.push('座標');if(!(d.tags&&d.tags.length))m.push('標籤');if(!(d.images&&d.images.length))m.push('圖');if(!d.english_name)m.push('英文');return m}
function qflags(d){const f=[];if(!(d.images&&d.images.length))f.push('<span class="qf no">無圖</span>');if(d.latitude==null)f.push('<span class="qf no">無座標</span>');if(!d.english_name)f.push('<span class="qf warn">無英文</span>');if(!(d.description&&d.description.length>=30))f.push('<span class="qf warn">描述薄</span>');if(!f.length)f.push('<span class="qf ok">✓ 完整</span>');return f.join('')}
function qflags_p(p){const f=[];if(!p.price_from)f.push('<span class="qf no">無價</span>');if(!(p.departures&&p.departures.length))f.push('<span class="qf no">無日期</span>');if(!p.country&&!(p.destinations&&p.destinations.length))f.push('<span class="qf warn">無目的地</span>');if(!(p.tags&&p.tags.length))f.push('<span class="qf warn">無標籤</span>');if(!f.length)f.push('<span class="qf ok">✓ 完整</span>');return f.join('')}
async function doLogin(){const b=document.getElementById('loginBtn');b.disabled=true;document.getElementById('loginErr').classList.add('hide')
 const {error}=await SB.auth.signInWithPassword({email:v('email'),password:v('pw')});b.disabled=false
 if(error){const e=document.getElementById('loginErr');e.textContent='登入失敗：'+error.message;e.classList.remove('hide');return}
 boot()}
async function doLogout(){await SB.auth.signOut();location.reload()}
async function boot(){const {data:{session}}=await SB.auth.getSession()
 if(!session){hide('app');show('login');return}
 hide('login');show('app');document.getElementById('who').textContent=session.user.email
 document.getElementById('view').innerHTML='<div class=spin>載入中…</div>';await load()}
async function loadAll(tbl){
 const all=[];let from=0;const PAGE=900
 while(true){
  const {data,error,count}=await SB.from(tbl).select('*',{count:'exact'}).order('source_agency').order('id').range(from,from+PAGE-1)
  console.log('[loadAll '+tbl+'] from='+from+' got='+(data?data.length:0)+' total='+count+(error?' ERR='+error.message:''))
  if(error){break}
  if(!data||!data.length)break
  all.push(...data);if(data.length<PAGE)break;from+=PAGE
  if(from>20000){console.log('safety break');break}
 }
 console.log('[loadAll '+tbl+'] FINAL='+all.length)
 return all}
async function load(){
 const [c,p]=await Promise.all([loadAll('scrape_candidates'),loadAll('scrape_products')])
 CANDS=c||[];PRODS=p||[]
 if(!CANDS.length&&!PRODS.length){document.getElementById('view').innerHTML='<div class=spin>無資料(權限?)</div>';return}
 const ags=[...new Set([...CANDS.map(d=>d.source_agency),...PRODS.map(d=>d.source_agency)])]
 if(!activeAgency||!ags.includes(activeAgency))activeAgency=ags[0]
 render()}
function setMode(m){MODE=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('on',b.id==='m-'+m));render()}
function setAgency(a){activeAgency=a;render()}
function tagsHtml(arr){if(!arr||!arr.length)return '';return arr.slice(0,6).map(t=>'<span class=tag>'+esc(t)+'</span>').join('')}
function render(){
 if(MODE==='dash'){renderDash();return}
 if(MODE==='compare'){renderCompare();return}
 const items=MODE==='cands'?CANDS:PRODS
 const ags=[...new Set(items.map(d=>d.source_agency))]
 const cs=[...new Set(items.map(d=>d.country).filter(Boolean))]
 const tabsHtml='<div class="tabs">'+ags.map(a=>'<div class="tab'+(a===activeAgency?' on':'')+'" onclick="setAgency(\''+a+'\')">'+esc(a)+'<span class=n>'+items.filter(d=>d.source_agency===a).length+'</span></div>').join('')+'</div>'
 let toolbarHtml='<div class=toolbar>'
 toolbarHtml+='<input id="search" placeholder="🔍 搜尋…" oninput="render()" value="'+esc(v('search'))+'"/>'
 if(MODE==='cands')toolbarHtml+='<select id="ftype" onchange="render()"><option value="">全部類型</option>'+['景點','飯店','餐廳'].map(t=>'<option'+(v('ftype')===t?' selected':'')+'>'+t+'</option>').join('')+'</select>'
 toolbarHtml+='<select id="fcountry" onchange="render()"><option value="">全部國家</option>'+cs.map(c=>'<option'+(v('fcountry')===c?' selected':'')+' value="'+esc(c)+'">'+esc(c)+'</option>').join('')+'</select>'
 if(MODE==='cands')toolbarHtml+='<select id="fstatus" onchange="render()"><option value="">全部狀態</option><option'+(v('fstatus')==='pending'?' selected':'')+' value="pending">待審核</option><option'+(v('fstatus')==='approved'?' selected':'')+' value="approved">已通過</option><option'+(v('fstatus')==='rejected'?' selected':'')+' value="rejected">已退回</option></select>'
 toolbarHtml+='<select id="fquality" onchange="render()"><option value="">品質：全部</option><option'+(v('fquality')==='good'?' selected':'')+' value="good">✓ 完整</option><option'+(v('fquality')==='bad'?' selected':'')+' value="bad">❌ 有缺</option></select>'
 toolbarHtml+='</div>'
 document.getElementById('view').innerHTML=tabsHtml+toolbarHtml+'<div class=cnt id=cnt></div><div id=list></div>'
 if(MODE==='cands')renderCands();else renderProds()
}
function renderCands(){
 const q=v('search').trim().toLowerCase(),ft=v('ftype'),fc=v('fcountry'),fs=v('fstatus'),fq=v('fquality')
 let rows=CANDS.filter(d=>d.source_agency===activeAgency&&(!ft||(d.type||'景點')===ft)&&(!fc||d.country===fc)&&(!fs||d.status===fs)&&(!q||((d.name||'')+(d.english_name||'')+(d.description||'')).toLowerCase().includes(q)))
 if(fq==='good')rows=rows.filter(d=>miss(d).length===0)
 else if(fq==='bad')rows=rows.filter(d=>miss(d).length>0)
 document.getElementById('cnt').textContent='顯示 '+rows.length+' 個 ('+activeAgency+')'
 document.getElementById('list').innerHTML=rows.slice(0,300).map(d=>{
  const sb=d.status==='approved'?'<span class="b ba">已通過</span>':d.status==='rejected'?'<span class="b br">已退回</span>':'<span class="b bp">待審核</span>'
  return '<div class=item onclick="openEditC(\''+d.id+'\')">'+
   '<div class=itop><div style=flex:1>'+
    '<div class=nm>'+esc(d.name)+' <span style=font-size:11px;color:#A89C8E>'+esc(d.type||'景點')+'</span></div>'+
    (d.english_name?'<div class=en>'+esc(d.english_name)+'</div>':'')+
    (d.local_name?'<div class=en style=opacity:.7>'+esc(d.local_name)+'</div>':'')+
    '<div class=reg>'+esc(d.country||'')+(d.region?' / '+esc(d.region):'')+(d.city?' / '+esc(d.city):'')+'</div>'+
    '<div style="margin-top:4px">'+qflags(d)+'</div>'+
    (d.tags&&d.tags.length?'<div style="margin-top:4px">'+tagsHtml(d.tags)+'</div>':'')+
   '</div><div class=badges>'+sb+(d.category?'<span class="b cat">'+esc(d.category)+'</span>':'')+(d.image_source==='wikidata'?'<span class="b bf">🆓圖</span>':'')+'</div></div>'+
   '<div class=desc>'+esc((d.description||'').slice(0,100))+'</div>'+
   '</div>'
 }).join('')+(rows.length>300?'<div class=cnt>僅顯示前 300、用搜尋/篩選縮小</div>':'')}
function renderProds(){
 const q=v('search').trim().toLowerCase(),fc=v('fcountry'),fq=v('fquality')
 let rows=PRODS.filter(p=>p.source_agency===activeAgency&&(!fc||p.country===fc)&&(!q||((p.title||'')+(p.country||'')+(p.destinations||[]).join(' ')).toLowerCase().includes(q)))
 const isOK=p=>!!(p.price_from&&p.departures&&p.departures.length&&(p.country||(p.destinations&&p.destinations.length)))
 if(fq==='good')rows=rows.filter(isOK)
 else if(fq==='bad')rows=rows.filter(p=>!isOK(p))
 document.getElementById('cnt').textContent='顯示 '+rows.length+' 個團體產品 ('+activeAgency+')'
 document.getElementById('list').innerHTML=rows.slice(0,200).map(p=>{
  const dests=(p.destinations||[]).slice(0,6).join(' / ')
  const deps=(p.departures||[]).slice(0,5).join('、')
  return '<div class=item onclick="openEditP(\''+p.id+'\')">'+
   '<div class=itop><div style=flex:1>'+
    '<div class=nm>'+esc(p.title||p.source_code)+(p.duration_days?' <span style=font-size:11px;color:#A89C8E>'+p.duration_days+'日</span>':'')+'</div>'+
    (dests?'<div class=reg>📍 '+esc(dests)+'</div>':'')+
    (p.price_text||p.price_from?'<div class=prod-price>'+esc(p.price_text||('NT$'+p.price_from.toLocaleString()))+(p.price_from?' 起':'')+'</div>':'')+
    (deps?'<div class=prod-deps>🗓 '+esc(deps)+(p.departures&&p.departures.length>5?'... 共 '+p.departures.length+' 場':'')+'</div>':'')+
    '<div style="margin-top:4px">'+qflags_p(p)+'</div>'+
    (p.tags&&p.tags.length?'<div style="margin-top:4px">'+tagsHtml(p.tags)+'</div>':'')+
   '</div></div>'+
   '</div>'
 }).join('')+(rows.length>200?'<div class=cnt>僅顯示前 200、用搜尋/篩選縮小</div>':'')}
function renderCompare(){
 // 商品比對 mode — William 內部市場參考工具
 const q=v('search').trim().toLowerCase()
 const fc=v('fcountry')
 const ft=v('ftype-c')
 const cs=[...new Set(PRODS.map(p=>p.country).filter(Boolean))]
 const types=[...new Set(PRODS.map(p=>p.product_type).filter(Boolean))]
 const banner='<div style="background:var(--warnbg);color:var(--warn);padding:10px 14px;border-radius:9px;margin-bottom:14px;font-size:13px">💼 <b>William 內部市場參考工具</b>：看各家行情、不是要給客人。AI 客服讀這份資料知道行情、但只報 Corner 自己的方案。</div>'
 const ag_chips='<div style="font-size:11.5px;color:var(--muted);margin-bottom:10px">資料來源：<span class=tag>山富</span><span class=tag>百威</span><span class=tag>雄獅</span><span class=tag>東南</span><span class=tag>旅遊家</span><span class=tag>晴日</span><span class=tag style="background:#FFE8C7">KKday</span><span class=tag style="background:#FFE8C7">GetYourGuide</span><span class=tag style="background:#FFE8C7">Klook</span></div>'
 let bar='<div class=toolbar>'
 bar+='<input id="search" placeholder="🔍 譬如：東京機場接送、京都和服體驗、清邁象園" oninput="render()" value="'+esc(v('search'))+'" style="max-width:380px"/>'
 bar+='<select id="fcountry" onchange="render()"><option value="">全部國家</option>'+cs.map(c=>'<option'+(v('fcountry')===c?' selected':'')+' value="'+esc(c)+'">'+esc(c)+'</option>').join('')+'</select>'
 const typeLabels={'transport_ticket':'🚂 交通票券','attraction_ticket':'🎫 景點門票','day_tour':'🚐 一日遊','experience':'🎨 體驗','transfer':'🚐 接送','sim_wifi':'📱 SIM/WiFi','cruise_activity':'⛵ 遊船','group_tour':'👥 團體','activity':'🎯 活動'}
 bar+='<select id="ftype-c" onchange="render()"><option value="">全部類型</option>'+types.map(t=>'<option'+(v('ftype-c')===t?' selected':'')+' value="'+esc(t)+'">'+(typeLabels[t]||t)+'</option>').join('')+'</select>'
 bar+='</div>'
 // 過濾 + 排序
 let rows=PRODS.filter(p=>(!fc||p.country===fc)&&(!ft||p.product_type===ft)&&(!q||((p.title||'')+(p.country||'')+(p.destinations||[]).join(' ')+(p.tags||[]).join(' ')+(p.notes||'')).toLowerCase().includes(q)))
 // 依 destination + product_type 分群、群內按 price_from sort
 const groups={}
 rows.forEach(p=>{
  const dest=(p.destinations||[])[0]||p.country||'其他'
  const k=dest+'|'+p.product_type
  if(!groups[k])groups[k]={dest,type:p.product_type,items:[]}
  groups[k].items.push(p)
 })
 // 篩有 ≥2 個 (才有比對價值) 或搜尋有結果就顯示

 if(!gArr.length){html+='<div class=spin>沒有比對群、換關鍵字試試</div>';document.getElementById('view').innerHTML=html;return}
 html+=gArr.slice(0,30).map(g=>{

  }).join('')
  return '<div style="background:var(--card);border:1px solid var(--line);border-radius:11px;margin-bottom:14px;overflow:hidden">'+
   '<div style="padding:11px 14px;background:var(--cream);border-bottom:1px solid var(--line)"><div style="font-size:14px;font-weight:700">📍 '+esc(g.dest)+' · '+tlabel+'</div><div style="font-size:11.5px;color:var(--muted);margin-top:2px">'+items.length+' 家有此類產品</div></div>'+

 }).join('')

async function saveC(){
 const p={name:v('e_name'),english_name:v('e_english_name')||null,local_name:v('e_local_name')||null,type:v('e_type'),category:v('e_category')||null,
  country:v('e_country')||null,region:v('e_region')||null,city:v('e_city')||null,address:v('e_address')||null,
  latitude:num(v('e_latitude')),longitude:num(v('e_longitude')),google_maps_url:v('e_google_maps_url')||null,
  description:v('e_description')||null,duration_minutes:v('e_duration_minutes')?parseInt(v('e_duration_minutes')):null,
  ticket_price:v('e_ticket_price')||null,opening_hours:v('e_opening_hours')||null,
  tags:arr(v('e_tags')),images:arr(v('e_images')),phone:v('e_phone')||null,website:v('e_website')||null,notes:v('e_notes')||null,
  description_polished:true,updated_at:new Date().toISOString()}
 const {error}=await SB.from('scrape_candidates').update(p).eq('id',editing.id)
 if(error){const e=document.getElementById('mErr');e.textContent='儲存失敗：'+error.message;e.classList.remove('hide');return}
 Object.assign(editing,p);closeEdit();render()}
