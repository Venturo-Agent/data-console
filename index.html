<!doctype html><html lang="zh-TW"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>資料工作台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--cream:#F6F2EC;--card:#fff;--line:#E2D9CC;--gold:#B5935A;--goldh:#A07F46;--primary:#3F3833;--secondary:#6E6258;--muted:#A89C8E;--ok:#6E8B6E;--okbg:#E8EEE4;--warn:#A87C3D;--warnbg:#F5ECD8;--danger:#B07A6A;--dangerbg:#F3E6E0}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--cream);color:var(--primary)}
.hide{display:none!important}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:30px;width:100%;max-width:360px}
.logo{width:44px;height:44px;border-radius:11px;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;margin-bottom:14px}
.lbox h1{font-size:19px;margin-bottom:4px}.lbox .sub{font-size:12.5px;color:var(--secondary);margin-bottom:18px}
label{font-size:12px;color:var(--secondary);display:block;margin:10px 0 4px}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:var(--cream);font-family:inherit}
textarea{min-height:80px;line-height:1.6}
.btn{background:var(--gold);color:#fff;border:none;border-radius:9px;padding:11px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:16px}
.btn:hover{background:var(--goldh)}.btn:disabled{opacity:.5}
.err{color:var(--danger);font-size:13px;margin-top:10px}
#app{min-height:100vh}
.top{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
.brand{display:flex;align-items:center;gap:10px}.brand .l{width:32px;height:32px;border-radius:8px;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.brand h1{font-size:16px}.who{font-size:12.5px;color:var(--secondary)}
.lnk{color:var(--gold);font-size:12.5px;cursor:pointer;background:none;border:none}
.wrap{padding:16px 18px;max-width:1100px;margin:0 auto}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:8px 16px;font-size:14px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--secondary);cursor:pointer}
.tab.on{background:var(--gold);color:#fff;border-color:var(--gold)}.tab .n{font-size:11.5px;opacity:.75;margin-left:6px}
.toolbar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.toolbar input{max-width:220px}.toolbar select{max-width:140px}
.cnt{font-size:12.5px;color:var(--muted);margin-bottom:10px}
.item{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px;cursor:pointer}
.item:hover{border-color:var(--gold)}
.itop{display:flex;justify-content:space-between;gap:10px}
.nm{font-weight:700;font-size:15px}.en{font-size:11.5px;color:var(--muted)}
.reg{font-size:12px;color:var(--secondary);margin-top:2px}
.desc{font-size:13px;color:var(--secondary);margin-top:6px;line-height:1.5}
.badges{display:flex;gap:5px;flex-direction:column;align-items:flex-end}
.b{font-size:11px;padding:2px 9px;border-radius:999px;white-space:nowrap}
.bp{background:var(--warnbg);color:var(--warn)}.ba{background:var(--okbg);color:var(--ok)}.br{background:var(--dangerbg);color:var(--danger)}
.cat{background:var(--cream);color:var(--secondary);border:1px solid var(--line)}
.miss{font-size:11px;color:var(--danger);margin-top:4px}
.mask{position:fixed;inset:0;background:rgba(40,35,30,.45);display:flex;align-items:center;justify-content:center;padding:14px;z-index:50}
.modal{background:var(--card);border-radius:14px;padding:20px;width:100%;max-width:560px;max-height:92vh;overflow:auto}
.modal h2{font-size:17px;margin-bottom:6px}
.sec{font-size:12px;font-weight:700;color:var(--gold);margin:14px 0 2px;border-bottom:1px solid var(--line);padding-bottom:4px}
.row2{display:flex;gap:10px}.row2>div{flex:1}.row3{display:flex;gap:8px}.row3>div{flex:1}
.gmaps{font-size:12px;color:var(--gold);cursor:pointer;background:none;border:none;margin-top:4px;text-decoration:underline}
.mactions{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;position:sticky;bottom:0;background:var(--card);padding-top:10px}
.btn2{padding:9px 14px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--secondary)}
.btn2.gold{background:var(--gold);color:#fff;border-color:var(--gold)}.btn2.ok{background:var(--ok);color:#fff;border-color:var(--ok)}.btn2.danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.spin{text-align:center;padding:40px;color:var(--muted)}
</style></head><body>
<div id="login"><div class="lbox">
  <div class="logo">D</div><h1>資料工作台</h1><div class="sub">請以授權帳號登入</div>
  <label>Email</label><input id="email" type="email" autocomplete="username"/>
  <label>密碼</label><input id="pw" type="password" autocomplete="current-password"/>
  <button class="btn" id="loginBtn" onclick="doLogin()">登入</button>
  <div class="err hide" id="loginErr"></div>
</div></div>
<div id="app" class="hide">
 <div class="top"><div class="brand"><div class="l">D</div><h1>資料工作台</h1></div>
  <div><span class="who" id="who"></span> <button class="lnk" onclick="doLogout()">登出</button></div></div>
 <div class="wrap">
  <div class="tabs" id="tabs"></div>
  <div class="toolbar">
   <input id="search" placeholder="🔍 搜尋名稱…" oninput="render()"/>
   <select id="ftype" onchange="render()"><option value="">全部類型</option><option value="景點">景點</option><option value="飯店">飯店</option><option value="餐廳">餐廳</option></select>
   <select id="fcountry" onchange="render()"><option value="">全部國家</option></select>
   <select id="fstatus" onchange="render()"><option value="">全部狀態</option><option value="pending">待審核</option><option value="approved">已通過</option><option value="rejected">已退回</option></select>
  </div>
  <div class="cnt" id="cnt"></div><div id="list"></div>
 </div>
</div>
<div id="modalRoot"></div>
<script>
const SB=supabase.createClient('https://aawrgygqgemgqssflfrx.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhd3JneWdxZ2VtZ3Fzc2ZsZnJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMDM3NTYsImV4cCI6MjA5Mzg3OTc1Nn0.XqYwfN9_RkinYXFnLUG90sQVfvVEhF-9yFU40AOHJec')
let DATA=[],activeAgency=null,editing=null
function esc(t){return(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function v(id){const e=document.getElementById(id);return e?e.value:''}
function show(id){document.getElementById(id).classList.remove('hide')}
function hide(id){document.getElementById(id).classList.add('hide')}
function missing(d){const m=[];if(!(d.description&&d.description.length>=20))m.push('描述');if(d.latitude==null)m.push('座標');if(!(d.tags&&d.tags.length))m.push('標籤');if(!(d.images&&d.images.length))m.push('圖片');if(!d.duration_minutes)m.push('停留');return m}
async function doLogin(){const b=document.getElementById('loginBtn');b.disabled=true;document.getElementById('loginErr').classList.add('hide')
 const {error}=await SB.auth.signInWithPassword({email:v('email'),password:v('pw')});b.disabled=false
 if(error){const e=document.getElementById('loginErr');e.textContent='登入失敗：'+error.message;e.classList.remove('hide');return}
 boot()}
async function doLogout(){await SB.auth.signOut();location.reload()}
async function boot(){const {data:{session}}=await SB.auth.getSession()
 if(!session){hide('app');show('login');return}
 hide('login');show('app');document.getElementById('who').textContent=session.user.email
 document.getElementById('list').innerHTML='<div class=spin>載入中…</div>';await load()}
async function load(){const {data,error}=await SB.from('scrape_candidates').select('*').order('source_agency').order('country').order('name')
 if(error){document.getElementById('list').innerHTML='<div class=spin>讀取失敗：'+esc(error.message)+'</div>';return}
 DATA=data||[]
 if(DATA.length===0){document.getElementById('list').innerHTML='<div class=spin>沒有資料（此帳號無權限）</div>';document.getElementById('tabs').innerHTML='';return}
 const ags=[...new Set(DATA.map(d=>d.source_agency))]
 if(!activeAgency||!ags.includes(activeAgency))activeAgency=ags[0]
 document.getElementById('tabs').innerHTML=ags.map(a=>'<div class="tab'+(a===activeAgency?' on':'')+'" onclick="setAgency(\''+a+'\')">'+esc(a)+'<span class=n>'+DATA.filter(d=>d.source_agency===a).length+'</span></div>').join('')
 const cs=[...new Set(DATA.map(d=>d.country).filter(Boolean))]
 document.getElementById('fcountry').innerHTML='<option value="">全部國家</option>'+cs.map(c=>'<option value="'+esc(c)+'">'+esc(c)+'</option>').join('')
 render()}
function setAgency(a){activeAgency=a;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.textContent.startsWith(a)));render()}
function render(){const q=v('search').trim().toLowerCase(),ft=v('ftype'),fc=v('fcountry'),fs=v('fstatus')
 let rows=DATA.filter(d=>d.source_agency===activeAgency&&(!ft||(d.type||'景點')===ft)&&(!fc||d.country===fc)&&(!fs||d.status===fs)&&(!q||((d.name||'')+(d.english_name||'')).toLowerCase().includes(q)))
 document.getElementById('cnt').textContent='顯示 '+rows.length+' 個（'+activeAgency+'）'
 document.getElementById('list').innerHTML=rows.slice(0,300).map(d=>{
  const sb=d.status==='approved'?'<span class="b ba">已通過</span>':d.status==='rejected'?'<span class="b br">已退回</span>':'<span class="b bp">待審核</span>'
  const ms=missing(d)
  return '<div class=item onclick="openEdit(\''+d.id+'\')"><div class=itop><div><div class=nm>'+esc(d.name)+' <span style=font-size:11px;color:#A89C8E>'+esc(d.type||'景點')+'</span></div>'+(d.english_name?'<div class=en>'+esc(d.english_name)+'</div>':'')+'<div class=reg>'+esc(d.country||'')+(d.region?' / '+esc(d.region):'')+(d.city?' / '+esc(d.city):'')+'</div></div><div class=badges>'+sb+(d.category?'<span class="b cat">'+esc(d.category)+'</span>':'')+'</div></div><div class=desc>'+esc((d.description||'').slice(0,90))+'</div>'+(ms.length?'<div class=miss>待補：'+ms.join('、')+'</div>':'')+'</div>'
 }).join('')+(rows.length>300?'<div class=cnt>僅顯示前 300、請用搜尋/篩選縮小</div>':'')}
function field(label,id,val,ph){return '<label>'+label+'</label><input id='+id+' value="'+esc(val==null?'':String(val))+'"'+(ph?' placeholder="'+ph+'"':'')+'/>'}
function openEdit(id){editing=DATA.find(d=>d.id===id);if(!editing)return;const d=editing
 const tags=(d.tags||[]).join(', '),imgs=(d.images||[]).join(', ')
 document.getElementById('modalRoot').innerHTML='<div class=mask onclick="if(event.target===this)closeEdit()"><div class=modal>'+
  '<h2>編輯資料</h2><div style=font-size:12px;color:#A89C8E>來源：'+esc(d.source_agency)+(d.source_tour?' · '+esc(d.source_tour):'')+'</div>'+
  '<div class=sec>基本</div>'+
  '<div class=row2><div>'+field('名稱','e_name',d.name)+'</div><div>'+field('英文名','e_english_name',d.english_name)+'</div></div>'+
  '<div class=row2><div><label>類型</label><select id=e_type><option'+((d.type==='景點'||!d.type)?' selected':'')+'>景點</option><option'+(d.type==='飯店'?' selected':'')+'>飯店</option><option'+(d.type==='餐廳'?' selected':'')+'>餐廳</option></select></div><div>'+field('分類','e_category',d.category,'如 自然景觀')+'</div></div>'+
  '<div class=sec>位置</div>'+
  '<div class=row3><div>'+field('國家','e_country',d.country)+'</div><div>'+field('地區','e_region',d.region)+'</div><div>'+field('城市','e_city',d.city)+'</div></div>'+
  field('地址','e_address',d.address)+
  '<div class=row3><div>'+field('緯度','e_latitude',d.latitude)+'</div><div>'+field('經度','e_longitude',d.longitude)+'</div><div>'+field('Google地圖','e_google_maps_url',d.google_maps_url)+'</div></div>'+
  '<button class=gmaps onclick="window.open(\'https://www.google.com/maps/search/\'+encodeURIComponent(v(\'e_name\')+\' \'+v(\'e_country\')))">🗺 在 Google 地圖搜尋此地（查座標）</button>'+
  '<div class=sec>詳情</div>'+
  '<label>描述</label><textarea id=e_description>'+esc(d.description||'')+'</textarea>'+
  '<div class=row3><div>'+field('建議停留(分)','e_duration_minutes',d.duration_minutes)+'</div><div>'+field('價格/門票','e_ticket_price',d.ticket_price)+'</div><div>'+field('營業時間','e_opening_hours',d.opening_hours)+'</div></div>'+
  field('標籤（逗號分隔）','e_tags',tags,'親子, 必去')+
  field('圖片網址（逗號分隔）','e_images',imgs)+
  '<div class=row2><div>'+field('電話','e_phone',d.phone)+'</div><div>'+field('官網','e_website',d.website)+'</div></div>'+
  '<label>備註</label><textarea id=e_notes style=min-height:50px>'+esc(d.notes||'')+'</textarea>'+
  '<div class=mactions>'+
   '<button class="btn2 gold" onclick="saveEdit()">💾 儲存</button>'+
   '<button class="btn2 ok" onclick="setStatus(\'approved\')">✓ 審核通過</button>'+
   '<button class="btn2 danger" onclick="setStatus(\'rejected\')">✗ 退回</button>'+
   '<button class=btn2 onclick="closeEdit()">取消</button>'+
  '</div><div class="err hide" id=mErr></div></div></div>'}
function closeEdit(){document.getElementById('modalRoot').innerHTML='';editing=null}
function arr(s){return s.split(',').map(x=>x.trim()).filter(Boolean)}
function num(s){const n=parseFloat(s);return isNaN(n)?null:n}
async function saveEdit(){
 const p={name:v('e_name'),english_name:v('e_english_name')||null,type:v('e_type'),category:v('e_category')||null,
  country:v('e_country')||null,region:v('e_region')||null,city:v('e_city')||null,address:v('e_address')||null,
  latitude:num(v('e_latitude')),longitude:num(v('e_longitude')),google_maps_url:v('e_google_maps_url')||null,
  description:v('e_description')||null,duration_minutes:v('e_duration_minutes')?parseInt(v('e_duration_minutes')):null,
  ticket_price:v('e_ticket_price')||null,opening_hours:v('e_opening_hours')||null,
  tags:arr(v('e_tags')),images:arr(v('e_images')),phone:v('e_phone')||null,website:v('e_website')||null,notes:v('e_notes')||null,
  description_polished:true,updated_at:new Date().toISOString()}
 const {error}=await SB.from('scrape_candidates').update(p).eq('id',editing.id)
 if(error){const e=document.getElementById('mErr');e.textContent='儲存失敗：'+error.message;e.classList.remove('hide');return}
 Object.assign(editing,p);closeEdit();render()}
async function setStatus(s){
 const {error}=await SB.from('scrape_candidates').update({status:s,reviewed_at:new Date().toISOString()}).eq('id',editing.id)
 if(error){const e=document.getElementById('mErr');e.textContent='更新失敗：'+error.message;e.classList.remove('hide');return}
 editing.status=s;closeEdit();render()}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})
boot()
</script></body></html>
